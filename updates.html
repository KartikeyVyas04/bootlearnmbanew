<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="guard.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BootLearn-MBA | Latest Updates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        html { scroll-behavior: smooth; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 🟢 CUSTOM RADAR & BELL ANIMATION */
        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            10%, 30%, 50% { transform: rotate(-15deg); }
            20%, 40%, 60% { transform: rotate(15deg); }
            70% { transform: rotate(0); }
        }
        .animate-ring { animation: ring 3s ease-in-out infinite; }

        @keyframes radarPulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .animate-radar { animation: radarPulse 2.5s cubic-bezier(0.0, 0.2, 0.8, 1) infinite; }
    </style>

    <script>
        let hasToken = false;
        for (let i = 0; i < localStorage.length; i++) {
            if (localStorage.key(i).startsWith('sb-') && localStorage.key(i).endsWith('-auth-token')) {
                hasToken = true; break;
            }
        }
        if (!hasToken) window.location.href = 'login.html';
    </script>
</head>
<body class="text-slate-800 antialiased selection:bg-fuchsia-100 selection:text-fuchsia-900 flex flex-col min-h-screen hidden" id="page-content">

    <div id="navbar-container"></div>
    <script src="nav.js"></script>

    <main class="flex-1 max-w-4xl mx-auto px-6 py-16 flex flex-col items-center justify-center w-full">
        
        <div class="w-full bg-white rounded-[2rem] border border-slate-200 shadow-xl shadow-fuchsia-900/5 p-10 md:p-16 text-center relative overflow-hidden">
            
            <div class="absolute top-0 right-0 w-64 h-64 bg-fuchsia-50 rounded-bl-full -z-10"></div>
            <div class="absolute bottom-0 left-0 w-48 h-48 bg-rose-50 rounded-tr-full -z-10"></div>

            <div class="relative w-32 h-32 mx-auto mb-8 flex items-center justify-center">
                <div class="absolute w-20 h-20 bg-fuchsia-200 rounded-full animate-radar"></div>
                <div class="absolute w-16 h-16 bg-fuchsia-300 rounded-full animate-radar" style="animation-delay: 0.5s;"></div>
                <div class="relative z-10 w-20 h-20 bg-gradient-to-br from-fuchsia-500 to-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-fuchsia-500/30 animate-ring text-white">
                    <i data-lucide="bell" class="w-8 h-8 fill-fuchsia-100"></i>
                </div>
            </div>

            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-fuchsia-100/50 border border-fuchsia-200 text-fuchsia-700 text-xs font-bold tracking-widest uppercase mb-6">
                <i data-lucide="radio" class="w-4 h-4"></i> Listening for updates
            </div>

            <h1 class="text-3xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-6">
                You're all <span class="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-500 to-rose-500">caught up!</span>
            </h1>
            
            <p class="text-lg text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed mb-10">
                There are no new exam notifications at the moment. When important dates for admit cards, form-filling deadlines, or exam changes are announced, they will appear right here.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="learn.html" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-slate-900 hover:bg-fuchsia-600 text-white px-8 py-4 rounded-xl font-bold transition-all shadow-lg hover:-translate-y-1">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Back to Learning
                </a>
            </div>

        </div>

    </main>

    <footer class="border-t border-slate-200 bg-white py-8 text-center mt-auto">
        <p class="text-sm font-semibold text-slate-500">&copy; 2026 BootLearn-MBA by Prakior. Curated Free Learning.</p>
    </footer>

    <script>
        // Reveal the page once pre-loader is happy
        document.getElementById('page-content').classList.remove('hidden');
        lucide.createIcons();

        /* Note: nav.js handles all global logic, sidebar, and Supabase initialization */
    </script>
</body>
</html>
