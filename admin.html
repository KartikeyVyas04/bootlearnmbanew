<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BootLearn-MBA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row text-slate-800">

    <aside class="w-full md:w-64 bg-slate-900 text-white flex flex-col shrink-0 min-h-[60px] md:min-h-screen shadow-xl z-20">
        <div class="p-6 flex items-center justify-between md:justify-center border-b border-slate-800">
            <div class="flex items-center gap-2 font-extrabold tracking-tight text-xl">
                <span class="text-white">Admin</span><span class="text-indigo-500">Panel</span>
            </div>
        </div>
        
        <nav class="hidden md:flex flex-col p-4 gap-2 flex-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-indigo-600/20 text-indigo-400 rounded-xl font-bold transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i> Mentorship Leads
            </a>
        </nav>

        <div class="hidden md:block p-4 border-t border-slate-800 mt-auto">
            <button onclick="adminLogout()" class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-bold transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i> Exit Admin
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 lg:p-10 w-full overflow-hidden">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Mentorship Applications</h1>
                <p class="text-slate-500 font-medium text-sm mt-1">Manage your waitlist and connect with students.</p>
            </div>
            <button onclick="fetchApplications()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg font-bold text-sm shadow-sm hover:bg-slate-50 transition-colors">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh Data
            </button>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 font-bold tracking-wider">
                            <th class="p-4 md:p-5">Applicant Name</th>
                            <th class="p-4 md:p-5">WhatsApp</th>
                            <th class="p-4 md:p-5">Target Exam</th>
                            <th class="p-4 md:p-5">Biggest Weakness</th>
                            <th class="p-4 md:p-5">Date Applied</th>
                            <th class="p-4 md:p-5 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTableBody" class="divide-y divide-slate-100 text-sm">
                        <tr>
                            <td colspan="6" class="p-10 text-center text-slate-500 font-medium">
                                <i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2 text-indigo-500"></i>
                                Verifying Admin Access...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // 1. Initialize Supabase
        const supaUrl = 'https://ykapcsubuoupqunurglz.supabase.co';
        const supaKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYXBjc3VidW91cHF1bnVyZ2x6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzYxNjMsImV4cCI6MjA4ODExMjE2M30.US-XWivfleScFchbKVqIJzFmgu2kOuTatmQXQgVo_K8';
        const supabase = window.supabase.createClient(supaUrl, supaKey);

        // ⚠️ ENTER YOUR EXACT ADMIN EMAIL HERE
        const ADMIN_EMAIL = 'connect.bootlearn@GMAIL.COM'; 

        // 2. Admin Security Guard (Frontend Check)
        async function checkAdminAccess() {
            const { data: { session }, error } = await supabase.auth.getSession();
            
            if (error || !session) {
                window.location.href = 'login.html';
                return false;
            }

            // Check if email matches AND is verified
            const userEmail = session.user.email;
            const isVerified = session.user.email_confirmed_at !== null;

            if (userEmail !== ADMIN_EMAIL || !isVerified) {
                alert("Unauthorized Area. Your account does not have Admin privileges.");
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        // 3. Fetch Data Function
        async function fetchApplications() {
            const tableBody = document.getElementById('applicationsTableBody');
            tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-indigo-500"></i></td></tr>`;
            lucide.createIcons();

            const { data, error } = await supabase
                .from('mentorship_applications')
                .select('*')
                .order('created_at', { ascending: false }); 

            if (error) {
                console.error("Database Error:", error);
                tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-bold">Error loading data. Check console.</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-500 font-medium">No mentorship applications received yet.</td></tr>`;
                return;
            }

            // Render Rows
            tableBody.innerHTML = '';
            data.forEach(app => {
                const date = new Date(app.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                const whatsappLink = `https://wa.me/${app.whatsapp_number.replace(/[^0-9]/g, '')}`;

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 md:p-5 font-bold text-slate-900">${app.full_name}</td>
                        <td class="p-4 md:p-5">
                            <a href="${whatsappLink}" target="_blank" class="flex items-center gap-1.5 text-emerald-600 font-bold hover:text-emerald-700 hover:underline">
                                <i data-lucide="phone" class="w-3.5 h-3.5"></i> ${app.whatsapp_number}
                            </a>
                        </td>
                        <td class="p-4 md:p-5 font-medium text-slate-700">
                            <span class="bg-slate-100 px-2.5 py-1 rounded text-xs font-bold border border-slate-200">${app.target_exam}</span>
                        </td>
                        <td class="p-4 md:p-5 font-medium text-slate-600">${app.biggest_weakness}</td>
                        <td class="p-4 md:p-5 text-slate-500 text-xs font-bold">${date}</td>
                        <td class="p-4 md:p-5 text-center">
                            <span class="inline-flex px-3 py-1 bg-amber-50 text-amber-600 border border-amber-200 rounded-full text-[10px] font-extrabold uppercase tracking-wide">
                                ${app.status || 'Pending'}
                            </span>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            lucide.createIcons();
        }

        // 4. Logout Function
        async function adminLogout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        // 5. Initialization
        async function init() {
            lucide.createIcons();
            const isAdmin = await checkAdminAccess();
            if (isAdmin) {
                fetchApplications();
            }
        }

        init();
    </script>
</body>
</html>
