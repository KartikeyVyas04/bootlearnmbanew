<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BootLearn-MBA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-indigo-100 selection:text-indigo-900">

    <div id="navbar-container"></div>
    <script src="nav.js"></script>

    <div class="flex-1 flex items-center justify-center px-4 relative overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/20 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500/20 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full max-w-md relative z-10 py-10">
            
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center group text-2xl font-extrabold text-slate-900 tracking-tight transition-colors">
                    <span class="group-hover:text-indigo-600 transition-colors">BootLearn-</span>
                    <span class="text-orange-600 group-hover:text-indigo-600 transition-colors">MBA</span>
                </a>
            </div>

            <div class="glass-card rounded-3xl border border-slate-200/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8">
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-2">Welcome Back 👋</h2>
                <p class="text-sm text-slate-500 font-medium mb-8">Sign in to continue your MBA preparation.</p>

                <button type="button" onclick="loginWithGoogle()" class="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-xl transition-all shadow-sm flex justify-center items-center gap-3 mb-6 group">
                    <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>

                <div class="relative flex items-center justify-center mb-6">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-[10px] font-bold uppercase tracking-widest">or email</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <form id="loginForm" class="space-y-5">
                    
                    <div id="error-msg" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm font-bold border border-red-100 flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i> 
                        <span id="error-text">Invalid credentials</span>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input type="email" id="email" required placeholder="you@example.com" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-slate-50/50 focus:bg-white text-sm font-semibold text-slate-900 transition-all">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Password</label>
                            <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Forgot?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-slate-50/50 focus:bg-white text-sm font-semibold text-slate-900 transition-all">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-slate-900/20 flex justify-center items-center gap-2 mt-2">
                        <span>Sign In</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </form>

                <div class="mt-8 text-center text-sm font-medium text-slate-500">
                    Don't have an account? <a href="signup.html" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors">Create one</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 🟢 GOOGLE LOGIN LOGIC
        async function loginWithGoogle() {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/learn.html'
                }
            });
            
            if (error) {
                const errorDiv = document.getElementById('error-msg');
                const errorText = document.getElementById('error-text');
                errorDiv.classList.remove('hidden');
                errorText.innerText = error.message;
            }
        }

        // Standard Email/Password Logic
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.innerHTML = `<span>Signing in...</span> <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            submitBtn.disabled = true;
            lucide.createIcons();

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                errorDiv.classList.remove('hidden');
                errorText.innerText = error.message; 
                submitBtn.innerHTML = `<span>Sign In</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                submitBtn.disabled = false;
                lucide.createIcons();
                return;
            }

            const redirectUrl = localStorage.getItem('prakior_redirect_url') || 'learn.html';
            localStorage.removeItem('prakior_redirect_url');
            window.location.href = redirectUrl;
        });
    </script>
</body>
</html>
