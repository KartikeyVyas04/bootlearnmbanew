<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BootLearn-MBA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-indigo-100 selection:text-indigo-900 px-4">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/30 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500/30 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center text-white text-lg font-extrabold shadow-md shadow-indigo-200 group-hover:scale-105 transition-transform">P</div>
                <span class="text-xl font-extrabold text-slate-900 tracking-tight">BootLearn-MBA</span>
            </a>
        </div>

        <div class="glass-card rounded-3xl border border-slate-200/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8">
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-2">Welcome Back 👋</h2>
            <p class="text-sm text-slate-500 font-medium mb-8">Sign in to continue your MBA preparation.</p>

            <form id="loginForm" class="space-y-5">
                
                <div id="error-msg" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm font-bold border border-red-100 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i> 
                    <span id="error-text">Invalid credentials</span>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-2">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="email" id="email" required placeholder="you@example.com" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-slate-50/50 focus:bg-white text-sm font-semibold text-slate-900 transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Forgot?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-slate-50/50 focus:bg-white text-sm font-semibold text-slate-900 transition-all">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-slate-900/20 flex justify-center items-center gap-2 mt-2">
                    <span>Sign In</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-500">
                Don't have an account? <a href="signup.html" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors">Create one</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 🟢 INITIALIZE SUPABASE (FIXED NAMING COLLISION)
        const supabaseUrl = 'https://ykapcsubuoupqunurglz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYXBjc3VidW91cHF1bnVyZ2x6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzYxNjMsImV4cCI6MjA4ODExMjE2M30.US-XWivfleScFchbKVqIJzFmgu2kOuTatmQXQgVo_K8';
        
        // Use supabaseClient instead of supabase to avoid CDN conflict
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Check if already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'learn.html';
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submitBtn');

            // UI Loading state
            submitBtn.innerHTML = `<span>Signing in...</span> <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75');
            lucide.createIcons();

            // Call Supabase API
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                // Show error
                errorDiv.classList.remove('hidden');
                errorText.innerText = "Invalid email or password.";
                
                // Reset button
                submitBtn.innerHTML = `<span>Sign In</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75');
                lucide.createIcons();
                return;
            }

            // Success
            window.location.href = 'learn.html';
        });
    </script>
</body>
</html>
