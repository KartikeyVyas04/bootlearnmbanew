<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile | BootLearn-MBA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-['Plus_Jakarta_Sans']">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl border border-slate-100 p-8 md:p-10 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-bl-full -z-0"></div>
        
        <div class="relative z-10">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-2 text-center">Almost there! 🎓</h1>
            <p class="text-sm text-slate-500 font-medium text-center mb-8 leading-relaxed">
                We need a few more details to customize your MBA preparation and shortlisting.
            </p>

            <form id="completeProfileForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Phone Number *</label>
                    <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="9876543210" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none text-sm font-semibold transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Category *</label>
                        <select id="category" required class="w-full px-3 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none text-sm font-semibold cursor-pointer">
                            <option value="General">General</option>
                            <option value="OBC">OBC</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                            <option value="EWS">EWS</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Gender *</label>
                        <select id="gender" required class="w-full px-3 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none text-sm font-semibold cursor-pointer">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">10th % *</label>
                        <input type="number" id="tenth" step="0.1" required placeholder="85" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none text-sm font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">12th % *</label>
                        <input type="number" id="twelfth" step="0.1" required placeholder="82" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none text-sm font-semibold">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex justify-center items-center gap-2 mt-4">
                    <span>Unlock My Dashboard</span> <i data-lucide="zap" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // 🟢 Initialize Supabase using same keys
        const supabaseUrl = 'https://ykapcsubuoupqunurglz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrYXBjc3VidW91cHF1bnVyZ2x6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzYxNjMsImV4cCI6MjA4ODExMjE2M30.US-XWivfleScFchbKVqIJzFmgu2kOuTatmQXQgVo_K8';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('completeProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Saving...`;
            lucide.createIcons();

            const updates = {
                phone: document.getElementById('phone').value,
                category: document.getElementById('category').value,
                gender: document.getElementById('gender').value,
                tenth_percent: document.getElementById('tenth').value,
                twelfth_percent: document.getElementById('twelfth').value,
            };

            const { error } = await supabaseClient.auth.updateUser({
                data: updates
            });

            if (error) {
                alert("Error updating profile: " + error.message);
                btn.disabled = false;
                btn.innerText = "Try Again";
            } else {
                window.location.href = 'learn.html';
            }
        });
    </script>
</body>
</html>
